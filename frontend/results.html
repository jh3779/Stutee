<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stutee — 생성 결과</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="app-shell">

      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">ST</div>
          <div class="brand-text">
            <strong>Stutee</strong>
            <span>Study Quiz Studio</span>
          </div>
        </div>
        <nav class="nav-list" aria-label="페이지 이동">
          <a class="nav-link" href="home.html">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7A1 1 0 003 11h1v5a2 2 0 002 2h2.5v-4h3v4H14a2 2 0 002-2v-5h1a1 1 0 00.707-1.707l-7-7z"/></svg>
            홈
          </a>
          <a class="nav-link" href="index.html">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
            문제 생성
          </a>
          <a class="nav-link active" href="results.html">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
            생성 결과
          </a>
          <a class="nav-link" href="history.html">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
            생성 이력
          </a>
        </nav>
        <div class="quota-box">
          <div class="quota-row">
            <span>오늘 생성</span>
            <strong id="dailyUsage">0 / 20</strong>
          </div>
          <div class="meter"><div id="dailyMeter" class="meter-fill"></div></div>
          <p class="quota-hint">게스트 · 분당 최대 5회</p>
        </div>
        <div class="profile-panel" id="profilePanel"></div>
      </aside>

      <main class="workspace">

        <!-- 상단 헤더 -->
        <header class="topbar" style="position:sticky;top:0;z-index:20;background:var(--workspace);">
          <div class="topbar-info">
            <h1>생성 결과</h1>
            <p id="resultSummary">최근 생성된 문제를 표시합니다.</p>
          </div>
          <div class="actions">
            <a class="btn btn-ghost" id="topbarAuth" href="login.html">로그인</a>
            <a class="btn btn-ghost" href="index.html">
              <svg style="width:15px;height:15px;flex-shrink:0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
              문제 생성으로
            </a>
            <button class="btn btn-ghost" id="copyBtn" type="button">전체 복사</button>
            <div class="tab-group">
              <button class="tab-btn active" type="button" data-view="cards">문항</button>
              <button class="tab-btn" type="button" data-view="json">JSON</button>
            </div>
          </div>
        </header>

        <!-- 결과 없음 -->
        <div class="no-result-panel hidden" id="noResultPanel">
          <div class="no-result-content">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
            </svg>
            <h2>아직 생성된 결과가 없습니다</h2>
            <p>문제 생성 페이지에서 학습 텍스트를 입력하고 문제를 생성해 보세요.</p>
            <a class="btn btn-primary" href="index.html">문제 생성하러 가기</a>
          </div>
        </div>

        <!-- 결과 패널 -->
        <section class="results-panel" id="resultsPanel">
          <div class="question-list" id="questionList"></div>
          <pre class="json-view hidden" id="jsonView"></pre>
        </section>

      </main>
    </div>

    <template id="questionTemplate">
      <article class="question-card">
        <div class="q-meta">
          <span class="pill type"></span>
          <span class="pill diff difficulty"></span>
          <span class="q-topic topic"></span>
        </div>
        <h3 class="q-text"></h3>
        <div class="choices"></div>
        <button class="answer-toggle" type="button">정답 보기</button>
        <div class="answer-box hidden">
          <strong></strong>
          <p></p>
        </div>
      </article>
    </template>

    <script src="./shared.js"></script>
    <script src="./results.js"></script>
  </body>
</html>
