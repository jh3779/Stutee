<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stutee — 생성 이력</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="app-shell">

      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">ST</div>
          <div class="brand-text">
            <strong>Stutee</strong>
            <span>Study Quiz Studio</span>
          </div>
        </div>
        <nav class="nav-list" aria-label="페이지 이동">
          <a class="nav-link" href="index.html">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
            문제 생성
          </a>
          <a class="nav-link" href="results.html">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
            생성 결과
          </a>
          <a class="nav-link active" href="history.html">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
            생성 이력
          </a>
        </nav>
        <div class="quota-box">
          <div class="quota-row">
            <span>오늘 생성</span>
            <strong id="dailyUsage">0 / 20</strong>
          </div>
          <div class="meter"><div id="dailyMeter" class="meter-fill"></div></div>
          <p class="quota-hint">무료 플랜 · 분당 최대 5회</p>
        </div>
      </aside>

      <main class="workspace">

        <header class="topbar">
          <div class="topbar-info">
            <h1>생성 이력</h1>
            <p id="historyCount">최근 생성한 문제 세트 목록입니다.</p>
          </div>
          <div class="actions">
            <a class="btn btn-ghost" href="index.html">
              <svg style="width:15px;height:15px;flex-shrink:0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
              새 문제 생성
            </a>
            <button class="btn btn-ghost btn-danger" id="clearHistoryBtn" type="button">전체 삭제</button>
          </div>
        </header>

        <!-- 이력 없음 -->
        <div class="no-result-panel hidden" id="noHistoryPanel">
          <div class="no-result-content">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <h2>생성 이력이 없습니다</h2>
            <p>문제를 생성하면 이곳에 이력이 저장됩니다.</p>
            <a class="btn btn-primary" href="index.html">문제 생성하러 가기</a>
          </div>
        </div>

        <!-- 이력 목록 -->
        <section class="history-panel" id="historyPanel">
          <div class="history-list" id="historyList"></div>
        </section>

      </main>
    </div>

    <script src="./shared.js"></script>
    <script src="./history.js"></script>
  </body>
</html>
