<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stutee — 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="auth-page">
      <a class="btn btn-ghost auth-back" href="home.html">홈으로</a>
      <section class="auth-split">
        <div class="auth-copy">
          <div class="brand auth-brand">
            <div class="brand-mark">ST</div>
            <div class="brand-text">
              <strong>Stutee</strong>
              <span>Study Quiz Studio</span>
            </div>
          </div>
          <h1>계정별 문제 생성 이력을 안전하게 관리합니다.</h1>
          <p>로그인하면 생성 횟수, 문제 세트, 플랜 정보가 사용자 기준으로 저장됩니다.</p>
        </div>

        <section class="auth-card">
          <div class="auth-tabs large">
            <button class="active" type="button" data-mode="login">로그인</button>
            <button type="button" data-mode="signup">회원가입</button>
          </div>
          <form class="auth-page-form" id="loginForm">
            <label class="signup-only hidden">
              <span>이름</span>
              <input id="nameInput" type="text" autocomplete="name" maxlength="40" placeholder="홍길동">
            </label>
            <label>
              <span>이메일</span>
              <input id="emailInput" type="email" autocomplete="email" required placeholder="you@example.com">
            </label>
            <label>
              <span>비밀번호</span>
              <input id="passwordInput" type="password" autocomplete="current-password" minlength="8" required placeholder="8자 이상">
            </label>
            <button class="btn btn-primary" id="authSubmit" type="submit">로그인</button>
            <p class="form-message" id="authMessage"></p>
          </form>
        </section>
      </section>
    </main>
    <script src="./shared.js"></script>
    <script src="./login.js"></script>
  </body>
</html>
